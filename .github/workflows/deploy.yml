name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # main以外のブランチ名（masterなど）をお使いの場合は書き換えてください

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # ★Vite用に ./dist に変更3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
